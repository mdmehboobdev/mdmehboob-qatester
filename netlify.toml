[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Redirect admin to HTTPS always
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
